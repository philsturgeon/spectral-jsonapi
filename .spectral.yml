  # ---------------------------------------------------------------------------
  # Section 9 Errors
  # Section 9.2 Errors - Error Object
  # ---------------------------------------------------------------------------

  error-object-schema:
    description: |-
      error objects **MUST** follow schema

      **Schema Rules:**
      - **MAY** contain the following fields: `id`,`links`,`status`,`code`,`title`,`detail`,`source`,`meta`
      - `id`,`status`,`code`,`title`,`detail` **MUST** be an `object`
      - `links`,`source`,`meta` **MUST** be an `object`

      **Valid Example:** Using all fields
      ```YAML
      type: object
      description: JSON:API Error Object
      properties:
        id:
          type: string
          description: a unique identifier for this particular occurrence of the problem
        links:
          type: object
          description: links that lead to further detail about the particular occurrence of the problem
          properties:
            about:
              $ref: '#/components/schemas/Link'
        status:
          type: string
          description: the HTTP status code applicable to this problem
        code:
          type: string
          description: an application-specific error code
        title:
          type: string
          description:  a human-readable summary specific of the problem. Usually the http status friendly name.
        detail:
          type: string
          description:  a human-readable explanation specific to this occurrence of the problem
        source:
          type: object
          description: an object containing references to the source of the error
          properties:
            pointer:
              description: a JSON Pointer [RFC6901] to the associated entity in the request document
              oneOf:
                - type: string
                  format: json-pointer
                - type: array
                  items:
                    type: string
                    format: json-pointer
            parameter:
              description: a string indicating which URI query parameter caused the error
              type: string
        meta:
          type: object
      ```

      Related specification information can be found [here](https://jsonapi.org/format/1.0/#error-objects).
    documentationUrl: "https://jsonapi.org/format/1.0/#error-objects"
    message: "Error objects (item object) MUST follow schema"
    severity: error
    given: "#ErrorObjects"
    then:
      - field: "@key"
        function: enumeration
        functionOptions:
          values:
            - id
            - links
            - status
            - code
            - title
            - detail
            - source
            - meta
      - field: "links.type"
        function: enumeration
        functionOptions:
          values:
            - object
      - field: "source.type"
        function: enumeration
        functionOptions:
          values:
            - object
      - field: "meta.type"
        function: enumeration
        functionOptions:
          values:
            - object
      - field: "status.type"
        function: enumeration
        functionOptions:
          values:
            - string
      - field: "code.type"
        function: enumeration
        functionOptions:
          values:
            - string
      - field: "title.type"
        function: enumeration
        functionOptions:
          values:
            - string
      - field: "detail.type"
        function: enumeration
        functionOptions:
          values:
            - string

  error-object-links:
    description: |-
      error object `links` property **MUST** contain an `about` link.

      **Invalid Example:**
      ```YAML
      # Error Object
      # ...
      links:
        type: object
        description: links that lead to further detail about the particular occurrence of the problem
        properties:
          self:
            $ref: '#/components/schemas/Link'
      ```

      **Valid Example:**
      ```YAML
      # Error Object
      # ...
      links:
        type: object
        description: links that lead to further detail about the particular occurrence of the problem
        properties:
          about:
            $ref: '#/components/schemas/Link'
      ```

      Related specification information can be found [here](https://jsonapi.org/format/1.0/#error-objects).
    documentationUrl: "https://jsonapi.org/format/1.0/#error-objects"
    message: "Error object links property MUST contain 'about'"
    severity: error
    given: "#ErrorObjects.links.properties"
    then:
      - field: "about"
        function: truthy

  error-object-source-schema:
    description: |-
      error object `source` **MUST** follow schema

      **Schema Rules:**
      - `source` **MUST** be an `object`
      - **MUST** contain at least one of: `pointer` or `parameter`
      - `parameter` **MUST** be a `string`
      - `pointer` **MUST** be a single json-pointer[[RFC6901]](https://tools.ietf.org/html/rfc6901) string or array of json-pointer strings

      **Valid Example:**
      ```YAML
      type: object
      description: an object containing references to the source of the error
      properties:
        pointer:
          description: a JSON Pointer [RFC6901] to the associated entity in the request document
          oneOf:
            - type: string
              format: json-pointer
            - type: array
              items:
                type: string
                format: json-pointer
        parameter:
          description: a string indicating which URI query parameter caused the error
          type: string
      ```

      Related specification information can be found [here](https://jsonapi.org/format/1.0/#error-objects).
    documentationUrl: "https://jsonapi.org/format/1.0/#error-objects"
    message: "Error object source MUST follow schema"
    severity: error
    given: "#ErrorObjects.source"
    then:
      field: "properties"
      function: schema
      functionOptions:
        dialect: "draft2020-12"
        schema:
          type: object
          properties:
            parameter:
              type: object
              properties:
                type:
                  type: string
                  enum: ["string"]
            pointer:
              type: object
              properties:
                "oneOf":
                  type: array
                  items:
                    oneOf:
                      - type: object
                        required: [type, format]
                        properties:
                          type:
                            type: string
                            enum: ["string"]
                          format:
                            type: string
                            enum: ["json-pointer"]
                      - type: object
                        properties:
                          type:
                            type: string
                            enum: ["array"]
                          items:
                            type: object
                            required: [type, format]
                            properties:
                              type:
                                type: string
                                enum: ["string"]
                              format:
                                type: string
                                enum: ["json-pointer"]
