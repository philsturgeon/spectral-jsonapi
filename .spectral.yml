      `DELETE` requests **MUST** support at least one of the following 2xx codes: 200, 202, or 204

      **Invalid Example:**
      ```YAML
      paths:
        /myResources/{id}:
          delete:
            responses:
              '404':
                $ref: '#/components/responses/404Error'
      ```

      **Valid Examples:**
      ```YAML
      paths:
        /myResources/{id}:
